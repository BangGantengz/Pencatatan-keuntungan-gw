<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿 - Personal Finance Manager</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        body{
            font-family:'Segoe UI','Inter',-apple-system,sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            overflow:hidden;
            position:relative;
        }
        
        /* Floating particles */
        .particles{
            position:absolute;
            inset:0;
            overflow:hidden;
        }
        .particle{
            position:absolute;
            width:4px;
            height:4px;
            background:rgba(255,215,0,.3);
            border-radius:50%;
            animation:floatUp 8s infinite;
        }
        .particle:nth-child(1){left:10%;animation-delay:0s}
        .particle:nth-child(2){left:25%;animation-delay:1s}
        .particle:nth-child(3){left:40%;animation-delay:2s}
        .particle:nth-child(4){left:55%;animation-delay:3s}
        .particle:nth-child(5){left:70%;animation-delay:4s}
        .particle:nth-child(6){left:85%;animation-delay:5s}
        .particle:nth-child(7){left:15%;animation-delay:6s}
        .particle:nth-child(8){left:60%;animation-delay:7s}
        .particle:nth-child(9){left:35%;animation-delay:2.5s}
        .particle:nth-child(10){left:75%;animation-delay:5.5s}
        
        @keyframes floatUp{
            0%{transform:translateY(100vh) scale(0);opacity:0}
            20%{opacity:1}
            80%{opacity:1}
            100%{transform:translateY(-100px) scale(1.5);opacity:0}
        }
        
        .loader-container{
            text-align:center;
            color:white;
            position:relative;
            z-index:1;
        }
        
        /* Logo ring */
        .logo-ring{
            width:130px;
            height:130px;
            margin:0 auto 25px;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .logo-ring::before{
            content:'';
            position:absolute;
            inset:-5px;
            border-radius:50%;
            border:3px solid transparent;
            border-top-color:#ffd700;
            border-right-color:#c41e3a;
            animation:spinRing 2s linear infinite;
        }
        .logo-ring::after{
            content:'';
            position:absolute;
            inset:5px;
            border-radius:50%;
            border:2px solid transparent;
            border-bottom-color:#ffd700;
            border-left-color:#c41e3a;
            animation:spinRing 3s linear infinite reverse;
        }
        
        @keyframes spinRing{
            to{transform:rotate(360deg)}
        }
        
        .logo-inner{
            width:100px;
            height:100px;
            background:linear-gradient(135deg,#1a1a2e,#16213e);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:2.8rem;
            box-shadow:0 0 30px rgba(255,215,0,.2),inset 0 0 20px rgba(255,215,0,.1);
            animation:pulseLogo 2s ease-in-out infinite;
            position:relative;
            z-index:1;
            border:3px solid rgba(255,215,0,.3);
        }
        
        @keyframes pulseLogo{
            0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(255,215,0,.2)}
            50%{transform:scale(1.05);box-shadow:0 0 50px rgba(255,215,0,.4)}
        }
        
        h1{
            font-size:2.8rem;
            font-weight:900;
            background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            text-shadow:none;
            margin-bottom:5px;
            letter-spacing:2px;
        }
        
        .subtitle{
            font-size:1rem;
            color:#aaa;
            margin-bottom:8px;
            letter-spacing:3px;
            text-transform:uppercase;
        }
        
        .tagline{
            font-size:.75rem;
            color:#888;
            margin-bottom:25px;
        }
        
        /* Progress bar */
        .progress-container{
            width:200px;
            height:3px;
            background:rgba(255,255,255,.1);
            border-radius:3px;
            margin:0 auto 15px;
            overflow:hidden;
        }
        .progress-fill{
            height:100%;
            background:linear-gradient(90deg,#c41e3a,#ffd700);
            border-radius:3px;
            animation:progressAnim 2s ease-in-out;
            width:0;
        }
        
        @keyframes progressAnim{
            0%{width:0}
            50%{width:70%}
            100%{width:100%}
        }
        
        .loading-text{
            color:#888;
            font-size:.7rem;
            animation:fadeText 1.5s infinite;
        }
        
        @keyframes fadeText{
            0%,100%{opacity:.4}
            50%{opacity:1}
        }
        
        /* Features list */
        .features{
            display:flex;
            gap:20px;
            justify-content:center;
            margin-top:20px;
        }
        .feature-item{
            text-align:center;
            font-size:.6rem;
            color:#aaa;
            opacity:0;
            animation:fadeIn .5s forwards;
        }
        .feature-item:nth-child(1){animation-delay:1.5s}
        .feature-item:nth-child(2){animation-delay:1.7s}
        .feature-item:nth-child(3){animation-delay:1.9s}
        .feature-item:nth-child(4){animation-delay:2.1s}
        
        .feature-icon{
            font-size:1.2rem;
            display:block;
            margin-bottom:3px;
        }
        
        @keyframes fadeIn{
            to{opacity:1}
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
    </div>
    
    <div class="loader-container">
        <div class="logo-ring">
            <div class="logo-inner">⛩️</div>
        </div>
        <h1>家計簿</h1>
        <p class="subtitle">KeuanganKu</p>
        <p class="tagline">Personal Finance Manager</p>
        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>
        <p class="loading-text">読み込み中... Memuat...</p>
        <div class="features">
            <div class="feature-item"><span class="feature-icon">📊</span>Dashboard</div>
            <div class="feature-item"><span class="feature-icon">💳</span>Transaksi</div>
            <div class="feature-item"><span class="feature-icon">💰</span>Budget</div>
            <div class="feature-item"><span class="feature-icon">📈</span>Tracking</div>
        </div>
    </div>
    
    <script>
        setTimeout(function(){window.location.href='dashboard.html'},2500)
    </script>
</body>
</html>

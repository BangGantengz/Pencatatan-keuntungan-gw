<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>取引 (Transaksi) - 家計簿 (KeuanganKu)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tempat-section{display:none;margin-top:4px;padding:8px;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:6px}
        .tempat-section.show{display:block}
        .nilai-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px}
        
        /* Tabel Transaksi Responsive */
        .transaksi-table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius);
        }
        .transaksi-table {
            min-width: 800px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.6rem;
        }
        .transaksi-table th,
        .transaksi-table td {
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .transaksi-table th {
            background: #010409;
            color: var(--gold);
            font-weight: 700;
            font-size: 0.55rem;
            border-bottom: 2px solid var(--gold);
        }
        .transaksi-table td {
            color: var(--text-bright);
            background: var(--bg-card);
        }
        .transaksi-table tbody tr:hover td {
            background: #1a1f2b;
        }
        
        @media (max-width: 720px) {
            .transaksi-table {
                min-width: 700px;
                font-size: 0.5rem;
            }
            .transaksi-table th,
            .transaksi-table td {
                padding: 5px 3px;
            }
            .transaksi-table th {
                font-size: 0.48rem;
            }
            .nilai-row {
                grid-template-columns: 1fr;
                gap: 4px;
            }
        }
        @media (max-width: 480px) {
            .transaksi-table {
                min-width: 620px;
                font-size: 0.45rem;
            }
            .transaksi-table th,
            .transaksi-table td {
                padding: 4px 2px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h2 style="color:#fff;font-size:.9rem;margin-bottom:5px">💳 取引を追加 (Tambah Transaksi)</h2>
        
        <div class="card"><div class="card-body" style="padding:8px">
            <div class="row g-2">
                <div class="col-6"><label class="form-label">📅 日付 (Tanggal) *</label><input type="date" id="tanggal" class="form-control"></div>
                <div class="col-6"><label class="form-label">🕐 時間 (Waktu)</label><input type="time" id="waktu" class="form-control"></div>
                
                <div class="col-12"><label class="form-label">💱 種類 (Jenis) *</label>
                    <select id="jenis" class="custom-select" onchange="onJenisChange()">
                        <option value="">選択 (Pilih Jenis)</option>
                        <option value="pemasukan">💰 収入 (Pemasukan)</option>
                        <option value="pengeluaran">💸 支出 (Pengeluaran)</option>
                    </select>
                </div>
                
                <div class="col-6"><label class="form-label">📂 カテゴリー (Kategori) *</label>
                    <select id="kategori" class="custom-select" onchange="updateSubKategori(this.value)"><option value="">選択 (Pilih Kategori)</option></select>
                </div>
                <div class="col-6"><label class="form-label">📁 サブカテゴリー (Sub Kategori)</label>
                    <select id="subKategori" class="custom-select"><option value="">選択 (Pilih Sub)</option></select>
                </div>
                
                <div class="col-12"><label class="form-label">📝 商品名 (Nama Barang) *</label><input type="text" id="nama" class="form-control" placeholder="例: Beras, Laptop, Daging"></div>
                
                <div class="col-12 tempat-section" id="tempatSection">
                    <label class="form-label" style="color:#ffd700">🏪 場所 & 価値 (Tempat & Nilai Barang)</label>
                    <input type="text" id="tempat" class="form-control" placeholder="🏪 場所: 7-Eleven, AEON" style="margin-bottom:4px">
                    <div class="nilai-row">
                        <input type="number" id="nilaiJumlah" class="form-control" placeholder="数量 (Jml)" min="0.1" step="0.1" value="1">
                        <select id="nilaiSatuan" class="custom-select">
                            <option value="kg">kg</option><option value="g">g</option>
                            <option value="pcs">pcs</option><option value="pack">pack</option>
                            <option value="box">box</option><option value="liter">L</option>
                            <option value="ml">ml</option><option value="unit">unit</option>
                            <option value="set">set</option><option value="item">item</option>
                            <option value="lembar">lembar</option><option value="botol">botol</option>
                            <option value="kaleng">kaleng</option><option value="sachet">sachet</option>
                        </select>
                        <input type="number" id="nilaiHarga" class="form-control" placeholder="¥ 総額" min="1" oninput="autoFillHarga()">
                    </div>
                </div>
                
                <div class="col-4"><label class="form-label">🔢 数量 (Jumlah) *</label><input type="number" id="jumlah" class="form-control" value="1" min="1" oninput="hitungTotal()"></div>
                <div class="col-4"><label class="form-label">💴 単価 (Harga) *</label><input type="number" id="harga" class="form-control" min="1" placeholder="¥" oninput="hitungTotal()"></div>
                <div class="col-4"><label class="form-label">🧾 合計 (Total)</label><input type="text" id="total" class="form-control" readonly></div>
                
                <div class="col-12"><button class="btn btn-success w-100" onclick="tambahTransaksi()">💾 保存 (Simpan)</button></div>
            </div>
        </div></div>

        <h2 style="color:#fff;font-size:.9rem;margin:6px 0">📋 取引リスト (Daftar Transaksi)</h2>
        
        <!-- WRAPPER UNTUK SCROLL HORIZONTAL -->
        <div class="transaksi-table-wrapper">
            <table class="transaksi-table">
                <thead>
                    <tr>
                        <th>📅 日付 (Tanggal)</th>
                        <th>💱 種類 (Jenis)</th>
                        <th>📂 カテゴリー (Kategori)</th>
                        <th>📝 商品名 (Nama)</th>
                        <th>🏪 場所 (Tempat)</th>
                        <th>📐 価値 (Nilai)</th>
                        <th>💴 単価 (Harga)</th>
                        <th>🧾 合計 (Total)</th>
                        <th>⚙️ 操作 (Aksi)</th>
                    </tr>
                </thead>
                <tbody id="bodyTabel">
                    <tr><td colspan="9" style="text-align:center;padding:30px;color:#8b949e">📭 取引なし (Belum ada transaksi)</td></tr>
                </tbody>
            </table>
        </div>
        <div id="transaksiPagination" style="text-align:center;margin:6px 0"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/transaksi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',function(){
            var n=new Date();
            document.getElementById('tanggal').value=n.toISOString().split('T')[0];
            document.getElementById('waktu').value=n.toTimeString().slice(0,5);
            initTransaksi();
        });
        function onJenisChange(){updateKategori();var j=document.getElementById('jenis').value;var ts=document.getElementById('tempatSection');if(j==='pengeluaran')ts.classList.add('show');else ts.classList.remove('show')}
        function autoFillHarga(){var v=parseInt(document.getElementById('nilaiHarga').value)||0;if(v>0)document.getElementById('harga').value=v;hitungTotal()}
    </script>
</body>
</html>

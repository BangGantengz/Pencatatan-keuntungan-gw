<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ツール (Tools) - 家計簿 (KeuanganKu)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-content">
        <div style="max-width:450px;margin:20px auto">
            <div class="card"><div class="card-body" style="text-align:center">
                <div style="font-size:3rem">🧹</div>
                <h5 style="color:#fff">データ管理 (Manajemen Data)</h5>
                <p style="color:var(--text-muted);font-size:.7rem">エクスポート・インポート・削除 (Export, Import & Hapus)</p>
                <div id="dataInfo" style="background:rgba(255,255,255,.03);border-radius:8px;padding:12px;margin:12px 0;font-size:.75rem;color:#e6e6e6"></div>
                <button class="btn btn-info btn-sm w-100 mb-2" onclick="exportAllData()">📥 全データエクスポート (Export Semua)</button>
                <button class="btn btn-outline-info btn-sm w-100 mb-2" onclick="document.getElementById('importFile').click()">📤 データインポート (Import)</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAllData(this)">
                <hr style="border-color:var(--border);margin:12px 0">
                <button class="btn btn-danger btn-sm w-100 mb-2" onclick="hapusSemuaData()">🗑️ 全データ削除 (Hapus Semua)</button>
                <button class="btn btn-outline-danger btn-sm w-100 mb-2" onclick="hapusTransaksi()">📝 取引のみ削除 (Hapus Transaksi)</button>
                <button class="btn btn-outline-danger btn-sm w-100 mb-2" onclick="hapusBudget()">💰 予算のみ削除 (Hapus Budget)</button>
                <button class="btn btn-outline-danger btn-sm w-100 mb-2" onclick="hapusHutang()">💳 借金のみ削除 (Hapus Hutang)</button>
                <div id="statusMsg" style="margin-top:8px;font-size:.7rem"></div>
                <hr style="border-color:var(--border);margin:12px 0">
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm w-100">⬅️ ダッシュボードに戻る (Kembali)</a>
            </div></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        function cek(){var t=JSON.parse(localStorage.getItem('keuangan_transaksi')||'[]'),b=0;for(var i=0;i<localStorage.length;i++){if(localStorage.key(i).indexOf('keuangan_budget_')===0)b++}var h=JSON.parse(localStorage.getItem('keuangan_hutang')||'[]');document.getElementById('dataInfo').innerHTML='📝 取引 (Transaksi): <strong>'+t.length+'</strong> 件<br>💰 予算 (Budget): <strong>'+b+'</strong> 月<br>💳 借金 (Hutang): <strong>'+h.length+'</strong> 件'}
        function exportAllData(){var d={exportDate:new Date().toISOString(),transaksi:JSON.parse(localStorage.getItem('keuangan_transaksi')||'[]'),hutang:JSON.parse(localStorage.getItem('keuangan_hutang')||'[]'),budget:{}};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('keuangan_budget_')===0)d.budget[k]=JSON.parse(localStorage.getItem(k)||'[]')}var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='backup-keuangan-'+new Date().toISOString().slice(0,10)+'.json';a.click();document.getElementById('statusMsg').innerHTML='<div class="alert alert-info">✅ エクスポート完了 (Export berhasil)</div>'}
        function importAllData(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!confirm('データをインポートしますか？ (Import?) 既存データは上書きされます！'))return;if(d.transaksi)localStorage.setItem('keuangan_transaksi',JSON.stringify(d.transaksi));if(d.hutang)localStorage.setItem('keuangan_hutang',JSON.stringify(d.hutang));if(d.budget){for(var k in d.budget)localStorage.setItem(k,JSON.stringify(d.budget[k]))}document.getElementById('statusMsg').innerHTML='<div class="alert alert-success">✅ インポート完了 (Import berhasil)!</div>';cek()}catch(err){document.getElementById('statusMsg').innerHTML='<div class="alert alert-danger">❌ 無効なファイル (File tidak valid)</div>'}};r.readAsText(f)}
        function hapusSemuaData(){if(!confirm('⚠️ 全データを完全に削除しますか？ (Hapus SEMUA data permanen?)'))return;localStorage.clear();document.getElementById('statusMsg').innerHTML='<div class="alert alert-success">✅ 全データ削除完了 (Semua data terhapus permanen)</div>';cek()}
        function hapusTransaksi(){if(!confirm('取引データのみ削除しますか？'))return;localStorage.removeItem('keuangan_transaksi');document.getElementById('statusMsg').innerHTML='<div class="alert alert-success">✅ 取引削除完了</div>';cek()}
        function hapusBudget(){if(!confirm('予算データのみ削除しますか？'))return;for(var i=localStorage.length-1;i>=0;i--){var k=localStorage.key(i);if(k.indexOf('keuangan_budget_')===0)localStorage.removeItem(k)}document.getElementById('statusMsg').innerHTML='<div class="alert alert-success">✅ 予算削除完了</div>';cek()}
        function hapusHutang(){if(!confirm('借金データのみ削除しますか？'))return;localStorage.removeItem('keuangan_hutang');document.getElementById('statusMsg').innerHTML='<div class="alert alert-success">✅ 借金削除完了</div>';cek()}
        cek();
    </script>
</body>
</html>
